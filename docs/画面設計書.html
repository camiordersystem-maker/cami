<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cami 受発注システム 画面設計書</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:'Helvetica Neue',Arial,'Hiragino Kaku Gothic ProN','Hiragino Sans',Meiryo,sans-serif;font-size:12px;color:#202124;background:#f8f9fa;}
.app{display:flex;flex-direction:column;height:100vh;}
.toolbar{background:#1b6b45;color:#fff;padding:6px 14px;display:flex;align-items:center;gap:10px;font-size:13px;font-weight:600;flex-shrink:0;border-bottom:1px solid #145738;}
.toolbar-sub{font-size:11px;font-weight:400;opacity:.75;margin-left:4px;}
.legend{margin-left:auto;display:flex;gap:12px;font-size:10px;font-weight:400;opacity:.85;}
.legend span{display:flex;align-items:center;gap:4px;}
.legend-dot{width:10px;height:10px;border-radius:2px;}
.body{display:flex;flex:1;overflow:hidden;}
.sidebar{width:176px;background:#fff;border-right:1px solid #e0e0e0;overflow-y:auto;flex-shrink:0;}
.sidebar-group{padding:8px 10px 3px;font-size:10px;font-weight:600;color:#5f6368;letter-spacing:.06em;border-top:1px solid #e8eaed;margin-top:2px;}
.sidebar-group:first-child{border-top:none;}
.sid-item{padding:5px 12px;cursor:pointer;font-size:11px;color:#3c4043;border-left:3px solid transparent;}
.sid-item:hover{background:#f1f3f4;}
.sid-item.active{background:#e6f4ea;color:#137333;font-weight:600;border-left-color:#1b6b45;}
.main{flex:1;overflow:auto;background:#fff;}
.sheet-header{background:#e6f4ea;border-bottom:2px solid #1b6b45;padding:10px 16px;}
.info-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px 16px;margin-bottom:8px;}
.info-item label{font-size:9px;font-weight:700;color:#1b6b45;text-transform:uppercase;letter-spacing:.08em;display:block;margin-bottom:2px;}
.info-item span{font-size:12px;color:#202124;font-weight:500;}
.info-item.full{grid-column:1/-1;border-top:1px solid #c6e8d3;padding-top:6px;margin-top:2px;}
.capture-zone{background:#f8f9fa;border:1.5px dashed #bdc1c6;border-radius:4px;margin:10px 16px;height:80px;display:flex;align-items:center;justify-content:center;color:#9aa0a6;font-size:11px;gap:6px;}
.capture-zone span{font-size:18px;opacity:.5;}
.section-title{padding:6px 16px 3px;background:#f1f3f4;border-bottom:1px solid #e0e0e0;border-top:1px solid #e0e0e0;font-size:10px;font-weight:700;color:#5f6368;letter-spacing:.06em;text-transform:uppercase;}
table{width:100%;border-collapse:collapse;table-layout:fixed;}
colgroup .c1{width:44px;}
colgroup .c2{width:170px;}
colgroup .c3{width:120px;}
colgroup .c4{width:90px;}
colgroup .c5{width:68px;}
colgroup .c6{width:130px;}
colgroup .c7{width:auto;}
thead th{background:#1b6b45;color:#fff;padding:6px 10px;font-size:11px;font-weight:600;text-align:left;border-right:1px solid #145738;white-space:nowrap;position:sticky;top:0;z-index:1;}
thead th:last-child{border-right:none;}
tbody td{padding:5px 10px;font-size:11px;border-bottom:1px solid #e8eaed;border-right:1px solid #e8eaed;vertical-align:top;line-height:1.5;}
tbody td:last-child{border-right:none;}
tbody tr:nth-child(even) td{background:#f8fffe;}
tbody tr:hover td{background:#e6f4ea;}
.no{text-align:center;color:#9aa0a6;font-size:11px;}
.tabs{background:#f1f3f4;border-top:1px solid #e0e0e0;display:flex;overflow-x:auto;flex-shrink:0;padding:0 4px;gap:1px;scrollbar-width:thin;}
.tabs::-webkit-scrollbar{height:4px;}
.tabs::-webkit-scrollbar-thumb{background:#bdc1c6;border-radius:2px;}
.tab{padding:6px 10px;font-size:10px;cursor:pointer;white-space:nowrap;color:#5f6368;border:1px solid transparent;border-bottom:none;border-radius:4px 4px 0 0;flex-shrink:0;margin-top:4px;font-weight:500;}
.tab:hover{background:#e8eaed;}
.tab.active{background:#fff;border-color:#e0e0e0;color:#1b6b45;font-weight:700;border-bottom:1px solid #fff;margin-bottom:-1px;}
.tab.admin-tab{border-top:3px solid #1b6b45;}
.tab.member-tab{border-top:3px solid #1a73e8;}
.badge{display:inline-block;padding:1px 6px;border-radius:3px;font-size:10px;font-weight:600;white-space:nowrap;}
.b-text{background:#e6f4ea;color:#137333;}
.b-pw{background:#fce8e8;color:#c5221f;}
.b-num{background:#fef0c7;color:#7a4f00;}
.b-area{background:#e6f4ea;color:#137333;}
.b-sel{background:#fef0c7;color:#7a4f00;}
.b-chk{background:#ede7f6;color:#4527a0;}
.b-btn{background:#fff9c4;color:#5d4037;}
.b-link{background:#e8f0fe;color:#1558d6;}
.b-disp{background:#e8f0fe;color:#1558d6;}
.b-cond{background:#f1f3f4;color:#5f6368;}
.b-tbl{background:#ede7f6;color:#4527a0;}
.b-graph{background:#fce4ec;color:#880e4f;}
.b-file{background:#fef0c7;color:#7a4f00;}
.b-filter{background:#e1f5fe;color:#01579b;}
.b-form{background:#f1f3f4;color:#3c4043;}
.b-grid{background:#ede7f6;color:#4527a0;}
.req{background:#fce8e8;color:#c5221f;display:inline-block;padding:1px 5px;border-radius:3px;font-size:10px;font-weight:600;}
.opt{background:#e6f4ea;color:#137333;display:inline-block;padding:1px 5px;border-radius:3px;font-size:10px;font-weight:600;}
.url{font-family:'Courier New',Courier,monospace;font-size:11px;background:#f1f3f4;padding:1px 5px;border-radius:3px;color:#137333;}
@media print{
  .sidebar,.tabs{display:none;}
  .main{overflow:visible;}
  .sheet{page-break-after:always;}
  .app{height:auto;}
  .body{overflow:visible;}
}
</style>
</head>

const typeBadge = {
  text:'<span class="badge b-text">テキスト入力</span>',
  pw:'<span class="badge b-pw">パスワード入力</span>',
  num:'<span class="badge b-num">数値入力</span>',
  area:'<span class="badge b-area">テキストエリア</span>',
  sel:'<span class="badge b-sel">セレクト</span>',
  chk:'<span class="badge b-chk">チェックボックス</span>',
  btn:'<span class="badge b-btn">ボタン</span>',
  link:'<span class="badge b-link">リンク</span>',
  disp:'<span class="badge b-disp">表示</span>',
  cond:'<span class="badge b-cond">表示（条件）</span>',
  tbl:'<span class="badge b-tbl">テーブル</span>',
  graph:'<span class="badge b-graph">グラフ</span>',
  file:'<span class="badge b-file">ファイル選択</span>',
  filter:'<span class="badge b-filter">フィルター（タブ）</span>',
  form:'<span class="badge b-form">フォーム</span>',
  grid:'<span class="badge b-tbl">グリッド表示</span>',
};

let currentIdx = 0;

function render(idx) {
  currentIdx = idx;
  const s = screens[idx];

  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', i===idx));
  document.querySelectorAll('.sid-item').forEach((t,i) => t.classList.toggle('active', i===idx));

  const groupLabel = s.group === 'admin' ? '管理者（本部）' : '店舗（会員）';
  const groupColor = s.group === 'admin' ? '#1b6b45' : '#1a73e8';

  const rows = s.items.map(r => {
    const reqBadge = r.req === 'req' ? '<span class="req">必須</span>' : r.req === 'opt' ? '<span class="opt">任意</span>' : '—';
    return `<tr>
      <td class="no">${r.no}</td>
      <td style="font-weight:500">${r.name}</td>
      <td>${typeBadge[r.type] || r.typeL}</td>
      <td style="color:#5f6368;font-family:monospace;font-size:11px">${r.input}</td>
      <td style="text-align:center">${reqBadge}</td>
      <td style="color:#5f6368;font-size:11px">${r.val}</td>
      <td style="color:#5f6368">${r.note}</td>
    </tr>`;
  }).join('');

  document.getElementById('main').innerHTML = `
<div class="sheet">
  <div class="sheet-header">
    <div class="info-grid">
      <div class="info-item"><label>画面ID</label><span>${s.id}</span></div>
      <div class="info-item"><label>画面名</label><span>${s.name}</span></div>
      <div class="info-item"><label>対象ユーザー</label><span>${s.target}</span></div>
      <div class="info-item"><label>区分</label><span style="color:${groupColor};font-weight:600">${groupLabel}</span></div>
      <div class="info-item"><label>URL / パス</label><span class="url">${s.url}</span></div>
      <div class="info-item full"><label>画面概要</label><span style="font-weight:400;line-height:1.6">${s.desc}</span></div>
    </div>
  </div>

  <div class="capture-zone">
    <span>&#128247;</span>
    <span>画面キャプチャ添付エリア（${s.id} — ${s.name}）</span>
  </div>

  <div class="section-title">&#9776;&nbsp; 画面項目定義</div>

  <table>
    <colgroup>
      <col class="c1"><col class="c2"><col class="c3"><col class="c4"><col class="c5"><col class="c6"><col class="c7">
    </colgroup>
    <thead>
      <tr>
        <th>No.</th>
        <th>項目名</th>
        <th>種別</th>
        <th>入力形式</th>
        <th>必須/任意</th>
        <th>バリデーション</th>
        <th>備考</th>
      </tr>
    </thead>
    <tbody>${rows}</tbody>
  </table>
</div>`;
}

const sidebar = document.getElementById('sidebar');
const tabs = document.getElementById('tabs');
let lastGroup = '';

screens.forEach((s, i) => {
  if (s.group !== lastGroup) {
    lastGroup = s.group;
    const g = document.createElement('div');
    g.className = 'sidebar-group';
    g.textContent = s.group === 'admin' ? '▍ 管理者（本部）' : '▍ 店舗（会員）';
    sidebar.appendChild(g);
  }
  const d = document.createElement('div');
  d.className = 'sid-item';
  d.textContent = s.id + ' ' + s.name;
  d.title = s.id + ': ' + s.name;
  d.onclick = () => render(i);
  sidebar.appendChild(d);

  const t = document.createElement('div');
  t.className = 'tab ' + (s.group === 'admin' ? 'admin-tab' : 'member-tab');
  t.textContent = s.id;
  t.title = s.name;
  t.onclick = () => render(i);
  tabs.appendChild(t);
});

render(0);
</script>
